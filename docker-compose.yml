version: "3.8"

services:
  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microservices_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Order API ─────────────────────────────────────────────────────────────────
  order-api:
    build:
      context: .
      dockerfile: OrderApi/Dockerfile
    container_name: order_api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__OrdersDb: "Server=sqlserver,1433;Database=OrdersDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Payment API ───────────────────────────────────────────────────────────────
  payment-api:
    build:
      context: .
      dockerfile: PaymentApi/Dockerfile
    container_name: payment_api
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PaymentsDb: "Server=sqlserver,1433;Database=PaymentsDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Catalog API ────────────────────────────────────────────────────────────────
  catalog-api:
    build:
      context: .
      dockerfile: CatalogApi/Dockerfile
    container_name: catalog_api
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CatalogDb: "Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Basket API ─────────────────────────────────────────────────────────────────
  basket-api:
    build:
      context: .
      dockerfile: BasketApi/Dockerfile
    container_name: basket_api
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__BasketDb: "Server=sqlserver,1433;Database=BasketDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Inventory API ─────────────────────────────────────────────────────────────
  inventory-api:
    build:
      context: .
      dockerfile: InventoryApi/Dockerfile
    container_name: inventory_api
    ports:
      - "5005:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__InventoryDb: "Server=sqlserver,1433;Database=InventoryDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── User API ──────────────────────────────────────────────────────────────────
  user-api:
    build:
      context: .
      dockerfile: UserApi/Dockerfile
    container_name: user_api
    ports:
      - "5006:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__UsersDb: "Server=sqlserver,1433;Database=UsersDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"
      Jwt__Key: "SUPER_SECRET_KEY_1234567890123456_EXTENDED_KEY_48"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Notification API ─────────────────────────────────────────────────────────
  notification-api:
    build:
      context: .
      dockerfile: NotificationApi/Dockerfile
    container_name: notification_api
    ports:
      - "5007:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: api_gateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      order-api:
        condition: service_healthy
      payment-api:
        condition: service_healthy
      catalog-api:
        condition: service_healthy
      basket-api:
        condition: service_healthy
      inventory-api:
        condition: service_healthy
      user-api:
        condition: service_healthy
      notification-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  sqlserver_data:
